trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubUsername: 'hardikdeshmukh'
  imageName: 'todo-api'
  imageTag: '$(Build.BuildId)'

stages:

- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildJob
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js 18'
    - script: npm install
      displayName: 'Install dependencies'
    - script: npm test
      displayName: 'Run tests'

- stage: Docker
  displayName: 'Build & Push Docker Image'
  dependsOn: Build
  jobs:
  - job: DockerJob
    steps:
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        containerRegistry: 'dockerhub-connection'
        repository: '$(dockerHubUsername)/$(imageName)'
        command: 'build'
        tags: |
          $(imageTag)
          latest
    - task: Docker@2
      displayName: 'Push to Docker Hub'
      inputs:
        containerRegistry: 'dockerhub-connection'
        repository: '$(dockerHubUsername)/$(imageName)'
        command: 'push'
        tags: |
          $(imageTag)
          latest

- stage: Deploy
  displayName: 'Deploy to Minikube'
  dependsOn: Docker
  jobs:
  - job: DeployJob
    steps:
    - script: |
        sed -i "s|$(dockerHubUsername)/$(imageName):.*|$(dockerHubUsername)/$(imageName):$(imageTag)|g" k8s/deployment.yaml
      displayName: 'Update image tag in manifest'
    - script: |
        curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
      displayName: 'Install kubectl'
    - script: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl rollout status deployment/todo-api
      displayName: 'Apply K8s manifests'
      env:
        KUBECONFIG: '$(KUBECONFIG)'